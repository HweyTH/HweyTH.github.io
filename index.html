<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hwey</title>
<style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(99, 60, 180, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(30, 90, 160, 0.12) 0%, transparent 50%);
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', 'Courier New', monospace;
      padding: 24px;
    }

    /* ── Terminal window ── */
    .terminal {
      width: 640px;
      max-width: 100%;
      background: #1e1e1e;
      border-radius: 12px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 24px 80px rgba(0, 0, 0, 0.7);
      overflow: hidden;
    }

    /* ── Title bar ── */
    .titlebar {
      background: #2c2c2e;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      user-select: none;
    }

    .dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
    }
    .dot.red    { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green  { background: #28c840; }

    .titlebar-title {
      flex: 1;
      text-align: center;
      font-size: 13px;
      color: #86868b;
      letter-spacing: 0.02em;
      /* Visually centered ignoring dots */
      margin-right: 45px;
    }

    /* ── Terminal body ── */
    .terminal-body {
      padding: 20px 24px 28px;
      min-height: 260px;
      font-size: 15px;
      line-height: 1.9;
      color: #e5e5e5;
    }

    /* ── Individual output lines ── */
    .line {
      display: flex;
      align-items: baseline;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .prompt {
      color: #28c840;
      margin-right: 10px;
      flex-shrink: 0;
      font-size: 14px;
    }

    .text {
      color: #e5e5e5;
    }

    /* ── Blinking block cursor ── */
    .cursor {
      display: inline-block;
      width: 9px;
      height: 1.1em;
      background: #e5e5e5;
      vertical-align: text-bottom;
      margin-left: 1px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>

<div class="terminal">
  <div class="titlebar">
    <div class="dots">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
    </div>
    <span class="titlebar-title">hwey — zsh</span>
  </div>
  <div class="terminal-body" id="output"></div>
</div>

<script>
  const messages = [
    "Hi there",
    "Welcome!",
    "My name is Gia Huy Thai",
    "Or you may know me as Hwey for short",
    "I'm working on several full-stack projects right now",
    "So I'll update this page more once I have some time",
    "Thank you for visiting :)"
  ];

  const TYPE_SPEED   = 48;   // ms per character
  const LINE_PAUSE   = 520;  // ms pause after each line finishes
  const START_DELAY  = 400;  // ms before typing begins

  const output = document.getElementById('output');

  // Cursor element — moves around as we type
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  output.appendChild(cursor);

  let msgIdx  = 0;
  let charIdx = 0;
  let textSpan = null;

  function tick() {
    if (msgIdx >= messages.length) return; // all done

    const msg = messages[msgIdx];

    // ── Start of a new line ──
    if (charIdx === 0) {
      const line = document.createElement('div');
      line.className = 'line';

      const prompt = document.createElement('span');
      prompt.className = 'prompt';
      prompt.textContent = '~$';

      textSpan = document.createElement('span');
      textSpan.className = 'text';

      line.appendChild(prompt);
      line.appendChild(textSpan);

      // Insert line before cursor, then move cursor inside line
      output.insertBefore(line, cursor);
      line.appendChild(cursor);
    }

    // ── Type one character ──
    textSpan.textContent += msg[charIdx];
    charIdx++;

    if (charIdx < msg.length) {
      setTimeout(tick, TYPE_SPEED);
    } else {
      // Line finished — reset, pause, then next line
      charIdx = 0;
      msgIdx++;
      // Park cursor back at output level for next line creation
      output.appendChild(cursor);
      if (msgIdx < messages.length) {
        setTimeout(tick, LINE_PAUSE);
      }
      // If all messages done, cursor stays after the last line (already there)
    }
  }

  setTimeout(tick, START_DELAY);
</script>

</body>
</html>
